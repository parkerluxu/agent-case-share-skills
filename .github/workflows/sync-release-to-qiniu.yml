name: Sync release to Qiniu

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package"
        required: true
        default: "v0.4.0"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install qiniu@^7.15.2

      - name: Build release zip
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: git archive --format=zip --output=agent-case-share-skill.zip "$RELEASE_TAG"

      - name: Upload to Qiniu
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: agent-case-share-images
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node scripts/upload-release-to-qiniu.mjs agent-case-share-skill.zip
